version: '3.8'

services:
  # 1. Реляционная база данных (Postgres 15 Alpine)
  postgres:
    image: postgres:15-alpine
    container_name: video-sense-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: videosense
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. Объектное хранилище (MinIO)
  minio:
    image: minio/minio:latest
    container_name: video-sense-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data

  # 3. Векторная база данных (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: video-sense-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
  
  backend:
    build: ./backend
    container_name: video-sense-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
      - qdrant
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/videosense
      DB_USER: admin
      DB_PASSWORD: password123
      
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      
      QDRANT_HOST: qdrant