services:
  # 1. Реляционная база данных (Postgres 15 Alpine)
  postgres:
    image: postgres:15-alpine
    container_name: video-sense-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: videosense
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. Объектное хранилище (MinIO)
  minio:
    image: minio/minio:latest
    container_name: video-sense-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data
      - shared_media:/app/shared_media

  # 3. Векторная база данных (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: video-sense-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
  
  backend:
    build: ./backend
    container_name: video-sense-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
      - qdrant
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      QDRANT_HOST: qdrant
      SHARED_MEDIA_PATH: /app/shared_media
    volumes:
      - shared_media:/app/shared_media
  
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_SERVER_HOST=http://localhost:8080
    container_name: video-sense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  
  video-engine:
    build: ./video-engine
    container_name: video-sense-engine
    depends_on:
      - minio
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      SHARED_MEDIA_PATH: /app/shared_media
    volumes:
      - shared_media:/app/shared_media
    
volumes:
  shared_media: