version: '3.8'

services:
  # 1. Реляционная база данных (Postgres 15 Alpine)
  postgres:
    image: postgres:15-alpine
    container_name: video-sense-postgres
    restart: always
    # Настройки доступа (дай эти данные Паше!)
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: videosense
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. Объектное хранилище (MinIO)
  minio:
    image: minio/minio:latest
    container_name: video-sense-minio
    restart: always
    command: server /data --console-address ":9001"
    # Настройки доступа (дай эти данные Паше и Мише!)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data

  # 3. Векторная база данных (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: video-sense-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage