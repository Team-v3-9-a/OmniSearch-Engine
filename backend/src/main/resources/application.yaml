ktor:
    application:
        modules:
            - com.v39a.omni.ApplicationKt.module
    deployment:
        port: 8080

storage:
    driverClassName: "org.postgresql.Driver"
    jdbcUrl: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    maxPoolSize: ${DB_MAX_POOL_SIZE:15}

minio:
    endpoint: ${S3_ENDPOINT}
    accessKey: ${S3_ACCESS_KEY}
    secretKey: ${S3_SECRET_KEY}
    bucket: "videos"
    externalUrl: ${S3_EXTERNAL_URL:http://localhost:9000}

qdrant:
    host: ${QDRANT_HOST}
    port: 6333

security:
    internalSecret: ${INTERNAL_API_SECRET}