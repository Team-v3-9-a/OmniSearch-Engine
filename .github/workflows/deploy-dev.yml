name: Deploy Dev (Preprod)

on:
  push:
    branches: [preprod]

# Не запускать параллельно несколько деплоев dev
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/omnisearch/dev/OmniSearch-Engine
          git fetch origin preprod
          git checkout preprod
          git reset --hard origin/preprod

      - name: Build and restart containers
        run: |
          cd /home/omnisearch/dev/OmniSearch-Engine
          docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build --remove-orphans

      - name: Cleanup old images
        run: docker image prune -f

      - name: Show running containers
        run: |
          cd /home/omnisearch/dev/OmniSearch-Engine
          docker compose -f docker-compose.dev.yml --env-file .env.dev -p omnisearch-dev ps
