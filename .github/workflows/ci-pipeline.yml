name: OmniSearch CI

on:
  push:
    branches: [ "main", "preprod" ]
  pull_request:
    branches: [ "main", "preprod" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # TODO: Когда появится package-lock.json, добавить cache: 'npm'
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build

  check-backend:
    name: Build Backend (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x backend/gradlew
      - name: Build FatJar
        run: cd backend && ./gradlew buildFatJar --no-daemon

  check-video-engine:
    name: Build Video Engine (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: video-engine/go.sum
      - name: Build Go code (Skip on CI)
        # gocv.io/x/gocv жестко требует CGO и установку OpenCV. Скипаем на CI по инструкции тимлида.
        run: |
          echo "Skipping go build on CI due to OpenCV / CGO dependencies"

  check-ml-engine:
    name: Lint & Verify ML Engine (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-engine/requirements.txt
      - name: Install dependencies & Ruff
        run: |
          cd ml-engine
          pip install -r requirements.txt
          pip install ruff
      - name: Run Ruff Linter
        run: |
          cd ml-engine
          ruff check .

  smoke-test-docker:
    name: Verify Docker Compose Build (Cached)
    runs-on: ubuntu-latest
    needs: [check-frontend, check-backend, check-video-engine, check-ml-engine]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images using Buildx Bake
        env:
          BUILDX_BAKE_ENTITLEMENTS_FS: 0
        run: |
          cp .env.example .env
          docker buildx bake -f docker-compose.yml \
            --set "*.cache-from=type=local,src=/tmp/.buildx-cache" \
            --set "*.cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max"
            
      - name: Move cache (prevent infinite growth)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache