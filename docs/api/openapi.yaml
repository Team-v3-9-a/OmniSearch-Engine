openapi: 3.0.3
info:
  title: OmniSearch Engine API
  description: |
    REST API контракты для MVP системы мультимодального поиска по видео (Control Plane). Определяет синхронный поиск, инициализацию асинхронного пайплайна загрузки и внутреннее взаимодействие между микросервисами.
  version: 0.2.0
servers:
- url: https://virtserver.swaggerhub.com/teamv39a/OmniSearch-Engine/0.1.0
  description: SwaggerHub API Auto Mocking
- url: /api/v1
  description: Основной префикс для внешних эндпоинтов
tags:
- name: Ingestion
  description: Загрузка и управление медиафайлами
- name: Retrieval
  description: Поиск по векторизованной базе знаний
- name: Internal
  description: Внутреннее взаимодействие между микросервисами (Video Engine, ML Engine, Backend)
paths:
  /upload:
    post:
      tags:
      - Ingestion
      summary: Загрузка видеофайла в систему
      description: "Инициализирует асинхронный процесс обработки. \nПринимает файл, сохраняет его в S3, создает запись в БД и возвращает ID задачи.\n"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/upload_body"
        required: true
      responses:
        "202":
          description: Файл успешно принят и поставлен в очередь на обработку.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: "Некорректный запрос."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    get:
      tags:
      - Retrieval
      summary: Поиск релевантных видеороликов (устаревший синхронный API)
      description: Синхронный поиск. Выполняет векторизацию текста через ML Engine и ищет в базе.
      parameters:
      - name: query
        in: query
        description: Текстовый поисковый запрос.
        required: true
        schema:
          minLength: 2
          type: string
      responses:
        "200":
          description: Отсортированный массив релевантных видео.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResultItem"
        "400":
          description: Некорректный запрос.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /internal/videos/{id}:
    patch:
      tags:
      - Internal
      summary: Webhook для обновления статуса видео (от Video Engine к Backend)
      description: Вызывается Video Engine для обновления статуса, длительности и других метаданных видеоролика после окончания нарезки и процессинга.
      parameters:
      - name: id
        in: path
        description: UUID видеоролика
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Internal-Secret
        in: header
        description: Секретный токен для доступа к внутреннему API
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoRequest"
        required: true
      responses:
        "200":
          description: Успешное обновление статуса.
        "400":
          description: Некорректные параметры или тело запроса.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Ошибка валидации X-Internal-Secret.

  http://video-engine:8081/process:
    post:
      tags:
      - Internal
      summary: Запуск процессинга видео в Video Engine
      description: Backend вызывает этот эндпоинт, чтобы начать нарезку кадров и извлечение аудио из исходного видео.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoProcessRequest"
        required: true
      responses:
        "202":
          description: Принято в асинхронную обработку.
        "400":
          description: Ошибка в теле запроса.

  http://ml-engine:8000/api/v1/process:
    post:
      tags:
      - Internal
      summary: Запуск ML-процессинга аудио
      description: Backend (или Video Engine) вызывает ML Engine для транскрибации и векторизации аудио.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AudioProcessRequest"
        required: true
      responses:
        "202":
          description: Задание на транскрибацию успешно создано.

  http://ml-engine:8000/api/v1/search:
    post:
      tags:
      - Internal
      summary: Векторный поиск (Proxy to ML Engine)
      description: Backend отправляет поисковый запрос к ML Engine, чтобы получить список релевантных видео и таймкодов.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
        required: true
      responses:
        "200":
          description: Успешный поиск.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

components:
  schemas:
    VideoStatus:
      type: string
      description: Текущий статус видеоролика в пайплайне обработки.
      enum:
      - UPLOADED
      - PROCESSING_ML
      - READY
      - ERROR

    UploadResponse:
      required:
      - status
      - video_id
      type: object
      properties:
        video_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/VideoStatus"
        message:
          type: string

    VideoProcessRequest:
      required:
      - video_id
      - s3_path
      type: object
      properties:
        video_id:
          type: string
          format: uuid
        s3_path:
          type: string
          description: "Путь в S3 к исходному видео. Пример: videos/file.mp4"

    AudioProcessRequest:
      required:
      - video_id
      - object_key
      type: object
      properties:
        video_id:
          type: string
          format: uuid
        bucket_name:
          type: string
          default: "video"
          description: "Имя бакета в S3. По умолчанию 'video'."
        object_key:
          type: string
          description: "Ключ объекта в S3. Пример: media/{id}/audio.wav"

    UpdateVideoRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/VideoStatus"
        durationSeconds:
          type: integer
          description: Длительность видеоролика в секундах
        fps:
          type: number
          format: float
          description: Кадровая частота исходного видео
        resolution:
          type: string
          description: Разрешение видео (например, "1920x1080")
        frameCount:
          type: integer
          description: Общее количество кадров
        thumbnailPath:
          type: string
          description: Путь к сохраненному превью в S3

    SearchRequest:
      required:
      - query
      type: object
      properties:
        query:
          type: string
        top_k:
          type: integer
          default: 5

    SearchResponse:
      required:
      - results
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"

    SearchResultItem:
      required:
      - score
      - video_id
      type: object
      properties:
        video_id:
          type: string
          format: uuid
        title:
          type: string
        thumbnail_url:
          type: string
          format: uri
        score:
          type: number
          format: float
        status:
          $ref: "#/components/schemas/VideoStatus"
        start_time:
          type: number
          format: float
        end_time:
          type: number
          format: float
        text_snippet:
          type: string

    ErrorResponse:
      required:
      - error_code
      - message
      type: object
      properties:
        error_code:
          type: integer
        message:
          type: string

    upload_body:
      required:
      - file
      type: object
      properties:
        file:
          type: string
          format: binary
